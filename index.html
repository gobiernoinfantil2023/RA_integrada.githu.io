<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RA Muestra</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: sans-serif;
    }

    #startButton {
      position: absolute;
      z-index: 999;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 22px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="startButton">TOCAR PARA INICIAR</div>

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  renderer="colorManagement: true;"
  embedded
>

  <a-assets>
    <video id="vid0" src="./1_generaciones.mp4"
      autoplay
      muted
      loop
      playsinline
      webkit-playsinline
      crossorigin="anonymous">
    </video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-plane width="1.6" height="0.9"
      material="shader: flat; src: #vid0">
    </a-plane>
  </a-entity>

</a-scene>

<script>
  const startButton = document.querySelector("#startButton");
  const sceneEl = document.querySelector("a-scene");

  startButton.addEventListener("click", async () => {

    startButton.style.display = "none";

    // 👉 Arranca MindAR manualmente (CLAVE para iOS)
    const mindarSystem = sceneEl.systems["mindar-image-system"];
    await mindarSystem.start();

    // 👉 Forzar reproducción de videos
    const videos = document.querySelectorAll("video");
    videos.forEach(video => {
      video.play().catch(e => console.log("Autoplay bloqueado:", e));
    });

  });
</script>

</body>
</html>
