<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Realidad Aumentada - Muestra de Arte</title>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
    <!-- A-Frame core -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <!-- Extras (look-controls, etc.) -->
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <!-- MindAR Image Tracking -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene
      mindar-image="imageTargetSrc: targets.mind; maxTrack: 1;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <!-- Precarga de videos -->
      <a-assets>
        <video id="vid1" src="1_generaciones.mp4" preload="auto" loop muted playsinline webkit-playsinline></video>
        <video id="vid2" src="2_abuela.mp4"      preload="auto" loop muted playsinline webkit-playsinline></video>
        <video id="vid3" src="3_adn.mp4"         preload="auto" loop muted playsinline webkit-playsinline></video>
        <video id="vid4" src="4_ciencia.mp4"     preload="auto" loop muted playsinline webkit-playsinline></video>
        <video id="vid5" src="5_familia.mp4"     preload="auto" loop muted playsinline webkit-playsinline></video>
        <video id="vid6" src="6_garabatos.mp4"   preload="auto" loop muted playsinline webkit-playsinline></video>
        <video id="vid7" src="7_hermanas.mp4"    preload="auto" loop muted playsinline webkit-playsinline></video>
        <video id="vid8" src="8_hermanos.mp4"    preload="auto" loop muted playsinline webkit-playsinline></video>
        <video id="vid9" src="9_juicio.mp4"      preload="auto" loop muted playsinline webkit-playsinline></video>
        <video id="vid10" src="10_regalo.mp4"    preload="auto" loop muted playsinline webkit-playsinline></video>
        <video id="vid11" src="11_resolucion.mp4" preload="auto" loop muted playsinline webkit-playsinline></video>
      </a-assets>

      <!-- Cámara fija (el tracking mueve los planos) -->
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Cada target (índice 0 al 10) muestra su video -->
      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#vid1" width="1.6" height="0.9" position="0 0 0" 
                 material="shader: flat; side: double; transparent: true" autoplay></a-video>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 1">
        <a-video src="#vid2" width="1.6" height="0.9" position="0 0 0" 
                 material="shader: flat; side: double; transparent: true" autoplay></a-video>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 2">
        <a-video src="#vid3" width="1.6" height="0.9" position="0 0 0" 
                 material="shader: flat; side: double; transparent: true" autoplay></a-video>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 3">
        <a-video src="#vid4" width="1.6" height="0.9" position="0 0 0" 
                 material="shader: flat; side: double; transparent: true" autoplay></a-video>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 4">
        <a-video src="#vid5" width="1.6" height="0.9" position="0 0 0" 
                 material="shader: flat; side: double; transparent: true" autoplay></a-video>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 5">
        <a-video src="#vid6" width="1.6" height="0.9" position="0 0 0" 
                 material="shader: flat; side: double; transparent: true" autoplay></a-video>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 6">
        <a-video src="#vid7" width="1.6" height="0.9" position="0 0 0" 
                 material="shader: flat; side: double; transparent: true" autoplay></a-video>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 7">
        <a-video src="#vid8" width="1.6" height="0.9" position="0 0 0" 
                 material="shader: flat; side: double; transparent: true" autoplay></a-video>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 8">
        <a-video src="#vid9" width="1.6" height="0.9" position="0 0 0" 
                 material="shader: flat; side: double; transparent: true" autoplay></a-video>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 9">
        <a-video src="#vid10" width="1.6" height="0.9" position="0 0 0" 
                 material="shader: flat; side: double; transparent: true" autoplay></a-video>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 10">
        <a-video src="#vid11" width="1.6" height="0.9" position="0 0 0" 
                 material="shader: flat; side: double; transparent: true" autoplay></a-video>
      </a-entity>
    </a-scene>

    <!-- Script para forzar reproducción y mantener relación de aspecto -->
    <script>
      (function() {
        // 1) Forzar autoplay en móviles (ya muteados)
        const videos = document.querySelectorAll('video');
        videos.forEach(v => {
          v.muted = true;
          v.loop = true;
          v.setAttribute('playsinline', '');
          v.setAttribute('webkit-playsinline', '');
          v.addEventListener('loadeddata', () => {
            v.play().catch(e => console.log('Autoplay pendiente de interacción:', e));
          });
        });

        // 2) Componente A-Frame para ajustar el alto según la relación de aspecto real del video
        AFRAME.registerComponent('video-fit', {
          init: function() {
            const el = this.el;
            el.addEventListener('materialvideoloadeddata', (e) => {
              const video = e.detail.src;
              if (!video) return;
              
              const videoWidth = video.videoWidth || 640;
              const videoHeight = video.videoHeight || 360;
              const aspect = videoHeight / videoWidth;
              
              // Ancho base deseado (ajústalo si quieres videos más grandes o pequeños)
              const baseWidth = 1.6;
              const calculatedHeight = baseWidth * aspect;
              
              el.setAttribute('width', baseWidth);
              el.setAttribute('height', calculatedHeight);
            });
          }
        });

        // Aplicar el componente a todos los <a-video>
        document.querySelectorAll('a-video').forEach(el => el.setAttribute('video-fit', ''));
      })();
    </script>
  </body>
</html>
