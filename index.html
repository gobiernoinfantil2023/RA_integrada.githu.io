<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Realidad Aumentada - Muestra de Arte</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Georgia', serif;
      }

      /* Splash encima de todo */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        color: #f0ede6;
        text-align: center;
        padding: 2rem;
        gap: 1.5rem;
        transition: opacity 0.6s ease;
      }

      #splash.oculto {
        opacity: 0;
        pointer-events: none;
      }

      #splash .titulo {
        font-size: clamp(1.4rem, 5vw, 2.2rem);
        font-weight: normal;
        letter-spacing: 0.08em;
        line-height: 1.3;
      }

      #splash .subtitulo {
        font-size: clamp(0.85rem, 3vw, 1rem);
        color: #a09a8e;
        letter-spacing: 0.05em;
        max-width: 280px;
        line-height: 1.6;
      }

      #splash .linea {
        width: 40px;
        height: 1px;
        background: #a09a8e;
      }

      #btn-iniciar {
        margin-top: 0.5rem;
        padding: 1rem 2.5rem;
        border: 1px solid #f0ede6;
        background: transparent;
        color: #f0ede6;
        font-family: 'Georgia', serif;
        font-size: 1rem;
        letter-spacing: 0.12em;
        cursor: pointer;
        transition: background 0.3s, color 0.3s;
        -webkit-tap-highlight-color: transparent;
      }

      #btn-iniciar:active {
        background: #f0ede6;
        color: #0a0a0a;
      }

      #btn-iniciar.cargando {
        opacity: 0.5;
        pointer-events: none;
      }

      #splash .nota {
        font-size: 0.75rem;
        color: #5a5550;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>

    <!-- Splash: visible hasta que el usuario toca -->
    <div id="splash">
      <div class="titulo">Muestra de Arte<br>en Realidad Aumentada</div>
      <div class="linea"></div>
      <div class="subtitulo">
        Apuntá la cámara hacia las imágenes de la muestra para ver los videos
      </div>
      <button id="btn-iniciar">COMENZAR</button>
      <div class="nota">Se solicitará permiso para usar la cámara</div>
    </div>

    <!--
      LA ESCENA EXISTE EN EL HTML DESDE EL INICIO (no se inyecta dinámicamente).
      autoStart: false  →  MindAR NO arranca la cámara automáticamente.
      El botón llama a arSystem.start() dentro del click handler,
      que es el gesto de usuario que iOS necesita para permitir la cámara.
      preload="none"  →  los videos no bloquean la carga inicial de la escena.
    -->
    <a-scene
      id="escena"
      mindar-image="
        imageTargetSrc: ./targets.mind;
        autoStart: false;
        filterMinCF: 0.001;
        filterBeta: 0.01;
        warmupTolerance: 5;
        missTolerance: 5;
      "
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >

      <a-assets timeout="30000">
        <video id="vid0"  src="./1_generaciones.mp4"  playsinline webkit-playsinline muted loop preload="none" crossorigin="anonymous"></video>
        <video id="vid1"  src="./2_abuela.mp4"        playsinline webkit-playsinline muted loop preload="none" crossorigin="anonymous"></video>
        <video id="vid2"  src="./3_adn.mp4"           playsinline webkit-playsinline muted loop preload="none" crossorigin="anonymous"></video>
        <video id="vid3"  src="./4_ciencia.mp4"       playsinline webkit-playsinline muted loop preload="none" crossorigin="anonymous"></video>
        <video id="vid4"  src="./5_familia.mp4"       playsinline webkit-playsinline muted loop preload="none" crossorigin="anonymous"></video>
        <video id="vid5"  src="./6_garabatos.mp4"     playsinline webkit-playsinline muted loop preload="none" crossorigin="anonymous"></video>
        <video id="vid6"  src="./7_hermanas.mp4"      playsinline webkit-playsinline muted loop preload="none" crossorigin="anonymous"></video>
        <video id="vid7"  src="./8_hermanos.mp4"      playsinline webkit-playsinline muted loop preload="none" crossorigin="anonymous"></video>
        <video id="vid8"  src="./9_juicio.mp4"        playsinline webkit-playsinline muted loop preload="none" crossorigin="anonymous"></video>
        <video id="vid9"  src="./10_regalo.mp4"       playsinline webkit-playsinline muted loop preload="none" crossorigin="anonymous"></video>
        <video id="vid10" src="./11_resolucion.mp4"   playsinline webkit-playsinline muted loop preload="none" crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Target 0: generaciones (paisaje 16:9) -->
      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane width="1.6" height="0.9" position="0 0 0"
          material="shader: flat; src: #vid0; side: double"></a-plane>
      </a-entity>

      <!-- Target 1: abuela (paisaje 16:9) -->
      <a-entity mindar-image-target="targetIndex: 1">
        <a-plane width="1.6" height="0.9" position="0 0 0"
          material="shader: flat; src: #vid1; side: double"></a-plane>
      </a-entity>

      <!-- Target 2: adn (paisaje 16:9) -->
      <a-entity mindar-image-target="targetIndex: 2">
        <a-plane width="1.6" height="0.9" position="0 0 0"
          material="shader: flat; src: #vid2; side: double"></a-plane>
      </a-entity>

      <!-- Target 3: ciencia (retrato 9:16) -->
      <a-entity mindar-image-target="targetIndex: 3">
        <a-plane width="0.9" height="1.6" position="0 0 0"
          material="shader: flat; src: #vid3; side: double"></a-plane>
      </a-entity>

      <!-- Target 4: familia (paisaje 16:9) -->
      <a-entity mindar-image-target="targetIndex: 4">
        <a-plane width="1.6" height="0.9" position="0 0 0"
          material="shader: flat; src: #vid4; side: double"></a-plane>
      </a-entity>

      <!-- Target 5: garabatos (retrato 9:16) -->
      <a-entity mindar-image-target="targetIndex: 5">
        <a-plane width="0.9" height="1.6" position="0 0 0"
          material="shader: flat; src: #vid5; side: double"></a-plane>
      </a-entity>

      <!-- Target 6: hermanas (paisaje 16:9) -->
      <a-entity mindar-image-target="targetIndex: 6">
        <a-plane width="1.6" height="0.9" position="0 0 0"
          material="shader: flat; src: #vid6; side: double"></a-plane>
      </a-entity>

      <!-- Target 7: hermanos (paisaje 16:9) -->
      <a-entity mindar-image-target="targetIndex: 7">
        <a-plane width="1.6" height="0.9" position="0 0 0"
          material="shader: flat; src: #vid7; side: double"></a-plane>
      </a-entity>

      <!-- Target 8: juicio (paisaje 16:9) -->
      <a-entity mindar-image-target="targetIndex: 8">
        <a-plane width="1.6" height="0.9" position="0 0 0"
          material="shader: flat; src: #vid8; side: double"></a-plane>
      </a-entity>

      <!-- Target 9: regalo (paisaje 16:9) -->
      <a-entity mindar-image-target="targetIndex: 9">
        <a-plane width="1.6" height="0.9" position="0 0 0"
          material="shader: flat; src: #vid9; side: double"></a-plane>
      </a-entity>

      <!-- Target 10: resolucion (paisaje 16:9) -->
      <a-entity mindar-image-target="targetIndex: 10">
        <a-plane width="1.6" height="0.9" position="0 0 0"
          material="shader: flat; src: #vid10; side: double"></a-plane>
      </a-entity>

    </a-scene>

    <script>
      // ============================================================
      // COMPONENTE: play/pause de video según detección de target
      // ============================================================
      AFRAME.registerComponent('ar-video-controller', {
        schema: { videoId: { type: 'string' } },
        init: function () {
          const videoEl = document.querySelector(this.data.videoId);
          const entity = this.el;

          entity.addEventListener('targetFound', function () {
            if (videoEl) {
              videoEl.currentTime = 0;
              videoEl.play().catch(function(e) {
                console.warn('Play bloqueado:', e);
              });
            }
          });

          entity.addEventListener('targetLost', function () {
            if (videoEl) {
              videoEl.pause();
            }
          });
        }
      });

      // Asignar controlador a cada target cuando la escena esté lista
      document.getElementById('escena').addEventListener('loaded', function () {
        document.querySelectorAll('[mindar-image-target]').forEach(function(target, index) {
          target.setAttribute('ar-video-controller', 'videoId: #vid' + index);
        });
      });

      // ============================================================
      // BOTÓN COMENZAR
      //
      // La clave: arSystem.start() se llama DENTRO del click handler.
      // iOS solo permite getUserMedia cuando hay un gesto activo del usuario.
      // También se hace play()+pause() en todos los videos para
      // desbloquear su reproducción futura en iOS.
      // ============================================================
      document.getElementById('btn-iniciar').addEventListener('click', function () {
        const btn = this;
        btn.textContent = 'ABRIENDO CÁMARA';
        btn.classList.add('cargando');

        // Unlock de videos dentro del mismo gesto (obligatorio en iOS)
        document.querySelectorAll('video').forEach(function(v) {
          v.play().then(function() { v.pause(); }).catch(function() {});
        });

        const escena = document.getElementById('escena');

        function arrancarAR() {
          const arSystem = escena.systems['mindar-image-system'];
          if (!arSystem) {
            console.warn('arSystem aún no disponible');
            return;
          }

          arSystem.start();

          // Ocultar splash cuando MindAR confirme que arrancó
          escena.addEventListener('arReady', function () {
            document.getElementById('splash').classList.add('oculto');
          }, { once: true });

          // Fallback: si arReady no llega en 10s, ocultar igual
          setTimeout(function () {
            document.getElementById('splash').classList.add('oculto');
          }, 10000);
        }

        // Si la escena ya cargó, arrancar directo; si no, esperar
        if (escena.hasLoaded) {
          arrancarAR();
        } else {
          escena.addEventListener('loaded', arrancarAR, { once: true });
        }
      });
    </script>

  </body>
</html>
