<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Realidad Aumentada - Muestra de Arte</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html, body { margin: 0; overflow: hidden; width: 100%; height: 100%; background: #000; }
    </style>
  </head>
  <body>

    <a-scene
      mindar-image="
        imageTargetSrc: ./targets.mind;
        filterMinCF: 0.001;
        filterBeta: 0.01;
        warmupTolerance: 5;
        missTolerance: 5;
      "
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >

      <!-- 
        preload="none" + sin timeout en a-assets:
        iOS no intenta cargar los videos al inicio, evitando el colapso de memoria.
        Los videos se cargan al llamar a .load() + .play() en targetFound.
      -->
      <a-assets>
        <video id="vid0"  src="./1_generaciones.mp4"  playsinline webkit-playsinline muted loop preload="none" crossorigin="anonymous"></video>
        <video id="vid1"  src="./2_abuela.mp4"        playsinline webkit-playsinline muted loop preload="none" crossorigin="anonymous"></video>
        <video id="vid2"  src="./3_adn.mp4"           playsinline webkit-playsinline muted loop preload="none" crossorigin="anonymous"></video>
        <video id="vid3"  src="./4_ciencia.mp4"       playsinline webkit-playsinline muted loop preload="none" crossorigin="anonymous"></video>
        <video id="vid4"  src="./5_familia.mp4"       playsinline webkit-playsinline muted loop preload="none" crossorigin="anonymous"></video>
        <video id="vid5"  src="./6_garabatos.mp4"     playsinline webkit-playsinline muted loop preload="none" crossorigin="anonymous"></video>
        <video id="vid6"  src="./7_hermanas.mp4"      playsinline webkit-playsinline muted loop preload="none" crossorigin="anonymous"></video>
        <video id="vid7"  src="./8_hermanos.mp4"      playsinline webkit-playsinline muted loop preload="none" crossorigin="anonymous"></video>
        <video id="vid8"  src="./9_juicio.mp4"        playsinline webkit-playsinline muted loop preload="none" crossorigin="anonymous"></video>
        <video id="vid9"  src="./10_regalo.mp4"       playsinline webkit-playsinline muted loop preload="none" crossorigin="anonymous"></video>
        <video id="vid10" src="./11_resolucion.mp4"   playsinline webkit-playsinline muted loop preload="none" crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Los planes referencian los videos por ID, igual que la versión Android -->
      <a-entity id="target0"  mindar-image-target="targetIndex: 0">
        <a-plane width="1.6" height="0.9" position="0 0 0" material="shader: flat; src: #vid0;  side: double"></a-plane>
      </a-entity>
      <a-entity id="target1"  mindar-image-target="targetIndex: 1">
        <a-plane width="1.6" height="0.9" position="0 0 0" material="shader: flat; src: #vid1;  side: double"></a-plane>
      </a-entity>
      <a-entity id="target2"  mindar-image-target="targetIndex: 2">
        <a-plane width="1.6" height="0.9" position="0 0 0" material="shader: flat; src: #vid2;  side: double"></a-plane>
      </a-entity>
      <a-entity id="target3"  mindar-image-target="targetIndex: 3">
        <a-plane width="0.9" height="1.6" position="0 0 0" material="shader: flat; src: #vid3;  side: double"></a-plane>
      </a-entity>
      <a-entity id="target4"  mindar-image-target="targetIndex: 4">
        <a-plane width="1.6" height="0.9" position="0 0 0" material="shader: flat; src: #vid4;  side: double"></a-plane>
      </a-entity>
      <a-entity id="target5"  mindar-image-target="targetIndex: 5">
        <a-plane width="0.9" height="1.6" position="0 0 0" material="shader: flat; src: #vid5;  side: double"></a-plane>
      </a-entity>
      <a-entity id="target6"  mindar-image-target="targetIndex: 6">
        <a-plane width="1.6" height="0.9" position="0 0 0" material="shader: flat; src: #vid6;  side: double"></a-plane>
      </a-entity>
      <a-entity id="target7"  mindar-image-target="targetIndex: 7">
        <a-plane width="1.6" height="0.9" position="0 0 0" material="shader: flat; src: #vid7;  side: double"></a-plane>
      </a-entity>
      <a-entity id="target8"  mindar-image-target="targetIndex: 8">
        <a-plane width="1.6" height="0.9" position="0 0 0" material="shader: flat; src: #vid8;  side: double"></a-plane>
      </a-entity>
      <a-entity id="target9"  mindar-image-target="targetIndex: 9">
        <a-plane width="1.6" height="0.9" position="0 0 0" material="shader: flat; src: #vid9;  side: double"></a-plane>
      </a-entity>
      <a-entity id="target10" mindar-image-target="targetIndex: 10">
        <a-plane width="1.6" height="0.9" position="0 0 0" material="shader: flat; src: #vid10; side: double"></a-plane>
      </a-entity>

    </a-scene>

    <script>
      AFRAME.registerComponent('ar-video-controller', {
        schema: { videoId: { type: 'string' } },
        init: function () {
          const videoEl = document.querySelector(this.data.videoId);
          const entity  = this.el;

          entity.addEventListener('targetFound', function () {
            if (!videoEl) return;
            // .load() es clave en iOS: fuerza la carga del video si preload="none"
            videoEl.load();
            videoEl.currentTime = 0;
            videoEl.play().catch(function(e) {
              setTimeout(function() { videoEl.play().catch(function(){}); }, 300);
            });
          });

          entity.addEventListener('targetLost', function () {
            if (videoEl) videoEl.pause();
          });
        }
      });

      document.querySelector('a-scene').addEventListener('loaded', function () {
        for (var i = 0; i <= 10; i++) {
          var t = document.getElementById('target' + i);
          if (t) t.setAttribute('ar-video-controller', 'videoId: #vid' + i);
        }
      });
    </script>

  </body>
</html>
